<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>HTML Forms</h1>
    <form method="get">
        <div class="form-element in-text">
            <label for="contact-name">Full Name</label><br>
            <input type="text" name="contactname" id="contact-name">
        </div>

        <div class="form-element in-email">
            <label for="contact-email">Email</label><br>
            <input type="email" name="email" id="contact-email">
        </div>

        <div class="form-element in-text">
            <label for="contact-phone">Phone Number</label><br>
            <input type="text" name="phone" id="contact-phone">
        </div>
        <div class="form-element in-textarea">
            <label for="msg-content">Your Message</label><br>
            <textarea name="message" id="message"></textarea>
        </div>

        <button type="submit">Send Email</button>
    </form>

    <a href="pages/personal.html">Back to Main Page</a>
</body>
</html>
